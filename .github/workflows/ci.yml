name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint & migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: rudapt
          POSTGRES_PASSWORD: rudapt
          POSTGRES_DB: rudapt
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rudapt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e .
      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://rudapt:rudapt@localhost:5432/rudapt
          JWT_SECRET: ci-secret
        run: alembic upgrade head
      - name: Import smoke
        env:
          DATABASE_URL: postgresql+asyncpg://rudapt:rudapt@localhost:5432/rudapt
          JWT_SECRET: ci-secret
        run: python -c "from app.main import app; print('app ok:', app.title)"

  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with: { context: ./backend, push: false, tags: rudapt-backend:ci }
