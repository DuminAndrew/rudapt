version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rudapt
      POSTGRES_PASSWORD: rudapt
      POSTGRES_DB: rudapt
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rudapt"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes: [./backend:/app]

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    command: arq app.workers.arq_app.WorkerSettings
    volumes: [./backend:/app]

  pdf:
    build: ./pdf-service
    environment:
      PORT: "9000"
      PDF_SERVICE_TOKEN: ${PDF_SERVICE_TOKEN:-}
    ports: ["9000:9000"]
    init: true

volumes:
  pgdata:
